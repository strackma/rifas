<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Egresados 2026 - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .n-celda {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            font-size: 0.9rem;
            color: #475569;
        }

        .n-celda:hover:not(.vendido) {
            transform: translateY(-3px);
            border-color: #3b82f6;
            color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .seleccionado {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #2563eb !important;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .vendido {
            background-color: #fee2e2 !important;
            color: #ef4444 !important;
            border-color: #fecaca !important;
            cursor: not-allowed;
            opacity: 0.8;
            position: relative;
        }

        .vendido::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 2px;
            background: #ef4444;
            transform: rotate(-45deg);
        }

        .grid-rifa {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-text { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        
        <!-- LOGIN SECTION -->
        <div id="loginSection" class="max-w-md mx-auto mt-20">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-center">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Sistema de Rifa</h2>
                <p class="text-slate-500 mb-8 text-sm">Ingresa la clave maestra para gestionar las ventas.</p>
                
                <input type="password" id="passInput" placeholder="Contraseña de acceso" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all mb-4 text-center font-bold tracking-widest">
                
                <button onclick="acceder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Entrar al Sistema
                </button>
                <p id="errorMsg" class="text-red-500 text-xs mt-4 font-semibold hidden">⚠️ La contraseña es incorrecta</p>
            </div>
        </div>

        <!-- MAIN APP SECTION -->
        <div id="mainSection" class="hidden animate-in fade-in duration-500">
            <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-black text-slate-800"> 🏅OMA 2026</h1>
                    <p class="text-slate-500 font-medium">Panel de Control de Rifa</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200 flex items-center">
                    <div class="w-2.5 h-2.5 bg-green-500 rounded-full mr-2 animate-pulse"></div>
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wider">Sync Activo</span>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- Formulario -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                        <h3 class="text-lg font-bold mb-4 flex items-center text-slate-700">
                            <span class="bg-blue-600 text-white w-6 h-6 rounded-md flex items-center justify-center text-xs mr-2">1</span>
                            Registro de Venta
                        </h3>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Comprador</label>
                                <div class="grid grid-cols-2 gap-2 mt-1">
                                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none">
                                    <input type="text" id="apellido" placeholder="Apellido" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Contacto</label>
                                <input type="tel" id="telefono" placeholder="WhatsApp / Teléfono" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-100 outline-none">
                            </div>
                            
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Vendedor (Egresado)</label>
                                <input type="text" id="vendedor" placeholder="Nombre del alumno" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-100 outline-none">
                            </div>

                            <div class="bg-blue-50 p-4 rounded-2xl text-center">
                                <span class="text-blue-400 font-bold text-[10px] uppercase">Número Seleccionado</span>
                                <div id="numDisplay" class="text-5xl font-black text-blue-600 my-1">--</div>
                            </div>

                            <button id="btnRegistrar" onclick="registrarVenta()" 
                                    class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                                Confirmar y Tachar
                            </button>
                            
                            <div id="loader" class="hidden text-center py-2">
                                <span class="loading-text text-blue-600 text-xs font-bold uppercase tracking-widest">Sincronizando...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mapa -->
                <div class="lg:col-span-8">
                    <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold flex items-center text-slate-700">
                                <span class="bg-blue-600 text-white w-6 h-6 rounded-md flex items-center justify-center text-xs mr-2">2</span>
                                Mapa de Números
                            </h3>
                            <div id="contadorVentas" class="text-sm font-black text-blue-600 bg-blue-50 px-4 py-1 rounded-full">
                                Cargando...
                            </div>
                        </div>
                        
                        <div id="gridRifa" class="grid-rifa"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzdCWIvMhF4rNWF3HybD0J2SzMDVLPdbl5cOpPzPYzi80HY0-QHo0UOL0olnHb80llY/exec"; 
        const CLAVE_MAESTRA = "OMAET16";

        let numeroSeleccionado = null;
        let ocupados = [];

        async function acceder() {
            const pass = document.getElementById('passInput').value;
            if (pass === CLAVE_MAESTRA) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                await cargarDatosExcel();
            } else {
                const err = document.getElementById('errorMsg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        async function cargarDatosExcel() {
            const contador = document.getElementById('contadorVentas');
            contador.innerText = "Sincronizando...";
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getOcupados`);
                const data = await response.json();
                ocupados = data.map(String);
                renderizarGrilla();
            } catch (e) {
                console.error("Error al cargar:", e);
                renderizarGrilla();
            }
        }

        function renderizarGrilla() {
            const grid = document.getElementById('gridRifa');
            grid.innerHTML = "";
            for (let i = 1; i <= 200; i++) {
                const celda = document.createElement('div');
                celda.innerText = i;
                celda.id = `celda-${i}`;
                if (ocupados.includes(i.toString())) {
                    celda.className = 'n-celda vendido';
                } else {
                    celda.className = 'n-celda';
                    celda.onclick = () => seleccionar(i);
                }
                grid.appendChild(celda);
            }
            document.getElementById('contadorVentas').innerText = `${ocupados.length} / 200 VENDIDOS`;
        }

        function seleccionar(num) {
            const anterior = document.querySelector('.seleccionado');
            if(anterior) anterior.classList.remove('seleccionado');
            
            numeroSeleccionado = num;
            const nuevaCelda = document.getElementById(`celda-${num}`);
            nuevaCelda.classList.add('seleccionado');
            
            const display = document.getElementById('numDisplay');
            display.innerText = num;
            display.classList.add('animate-bounce');
            setTimeout(() => display.classList.remove('animate-bounce'), 500);
        }

        async function registrarVenta() {
            const fields = {
                nombre: document.getElementById('nombre'),
                apellido: document.getElementById('apellido'),
                telefono: document.getElementById('telefono'),
                vendedor: document.getElementById('vendedor')
            };

            if(!fields.nombre.value || !fields.apellido.value || !fields.telefono.value || !fields.vendedor.value || !numeroSeleccionado) {
                alert("⚠️ Por favor, completa los datos y selecciona un número.");
                return;
            }

            const btn = document.getElementById('btnRegistrar');
            const loader = document.getElementById('loader');

            btn.disabled = true;
            loader.classList.remove('hidden');

            const formData = new URLSearchParams();
            formData.append('nombre', fields.nombre.value);
            formData.append('apellido', fields.apellido.value);
            formData.append('telefono', fields.telefono.value);
            formData.append('vendedor', fields.vendedor.value);
            formData.append('numero', numeroSeleccionado);
            formData.append('pass', CLAVE_MAESTRA);

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                });

                Object.values(fields).forEach(f => f.value = "");
                document.getElementById('numDisplay').innerText = "--";
                
                ocupados.push(numeroSeleccionado.toString());
                numeroSeleccionado = null;
                renderizarGrilla();
                
                alert("✅ Venta registrada correctamente.");

            } catch (e) {
                alert("❌ Error al conectar con Excel.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
